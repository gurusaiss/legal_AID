[build]
  command = "npm install && npm run build"
  publish = "docs"  # Changed to match Vite's production output
  functions = "netlify/functions"

[dev]
  command = "npm run dev"
  port = 3000
  targetPort = 3000
  publish = "docs"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Handle API requests in production
[[redirects]]
  from = "/api/*"
  to = "https://your-api-endpoint.com/:splat"  # Replace with your actual API endpoint
  status = 200